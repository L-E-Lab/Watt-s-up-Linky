esphome:
  name: linky-teleinfo
  friendly_name: Linky-teleinfo
  
esp32:
  variant: esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:
  level: debug
  baud_rate: 0

# Enable Home Assistant API
api:
  encryption:
    key: "<KEY>"

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Linky-Teleinfo Fallback Hotspot"
    password: !secret fallback_hs_password

# # Web Server: https://esphome.io/components/web_server.html
# web_server:
#   local: true
#   port: 80
#   auth:
#     username: !secret esphome_web_server_username
#     password: !secret esphome_web_server_password

uart:
  id: uart_bus
  rx_pin: GPIO17  
#  tx_pin: GPI17
  baud_rate: 1200
  parity: EVEN
  data_bits: 7
  # debug:
  #   direction: BOTH
  #   dummy_receiver: false
  #   after:
  #     delimiter: "\n"
  #   sequence:
  #     - lambda: UARTDebug::log_string(direction, bytes);

teleinfo:
  id: esp_teleinfo
  update_interval: 60s
  historical_mode: true

binary_sensor:
  - platform: status
    id: teleinfo_status
    name: "Teleinfo Status"

sensor:
  - platform: wifi_signal
    name: "Signal wifi"
    update_interval: 60s
    unit_of_measurement: dB
    accuracy_decimals: 0
    force_update: false
    icon: mdi:wifi
    
  - platform: uptime
    id: uptime_seconds
    name: "Uptime Sensor"
    update_interval: 60s
    unit_of_measurement: s
    accuracy_decimals: 0
    force_update: false
    icon: mdi:timer

  # Intensité souscrite
  - platform: teleinfo
    tag_name: "ISOUSC"
    name: "Linky Intensité souscrite"
    unit_of_measurement: A
    device_class: current
    state_class: measurement
  # Index option Base
  - platform: teleinfo
    tag_name: "BASE"
    name: "Linky Index Base"
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
